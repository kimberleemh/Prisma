<html> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌟 STARGEMS 💎</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #E6F0FF, #CCE0FF); /* azul suave */
            color: #1A1F71; /* azul oscuro para contraste */
            text-align: center;
        }

        header {
            background-color: #4A70B8; /* azul medio */
            color: #ffffff;
            padding: 20px 0;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        header h1 {
            font-size: 2.5rem;
            margin: 0;
        }

        header h2 {
            font-size: 1.2rem;
            color: #A3C1FF; /* azul claro */
            font-weight: normal;
            margin: 10px 0 0;
        }

        main {
            padding: 40px 20px;
        }

        h3 {
            font-size: 1.8rem;
            color: #2E3A87; /* azul profundo */
            margin-bottom: 30px;
        }

        .botones {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 25px;
        }

        .boton {
            background-color: #A3C1FF; /* azul pastel */
            border: 2px solid #4A70B8; /* azul medio */
            border-radius: 15px;
            width: 220px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-decoration: none;
            color: #1A1F71; /* azul oscuro */
            font-size: 1.3rem;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .boton:hover {
            background-color: #7FAEFF; /* azul más brillante */
            transform: scale(1.05);
            box-shadow: 0 6px 16px rgba(0,0,0,0.2);
        }

    </style>
</head>
<body>

    <header>
        <h1>✨💎 STARGEMS 💎✨</h1>
        <h2>“Porque en cada página puede haber una gema escondida”</h2>
    </header>

    <main>
        <h3>Productos Principales</h3>

        <div class="botones">
            <a href="Mangas.html" class="boton">📘 Mangas</a>
            <a href="Descripcion.html" class="boton">📖 Descripción</a>
            <a href="Resumen.html" class="boton">📝 Información</a>
            <a href="Historial.html" class="boton">💬 Comentarios y Recomendaciones</a>
        </div>
    </main>

</body>
</html>
